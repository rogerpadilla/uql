services:
  mysql:
    image: mysql:9.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_USER: 'test'
      MYSQL_PASSWORD: 'test'
      MYSQL_DATABASE: 'test'
    ports:
      - 3316:3306
    container_name: uql-mysql-9
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  mariadb:
    image: mariadb:12.3-rc
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_USER: 'test'
      MYSQL_PASSWORD: 'test'
      MYSQL_DATABASE: 'test'
    ports:
      - 3326:3306
    container_name: uql-mariadb-12
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 5s
      retries: 10

  postgres:
    image: pgvector/pgvector:pg18
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - 5442:5432
    container_name: uql-postgres-18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 5s
      timeout: 5s
      retries: 10


  cockroachdb:
    image: cockroachdb/cockroach:latest
    container_name: cockroachdb_uql
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8080:8080"
