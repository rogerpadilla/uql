services:
  mysql:
    image: mysql:9.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_USER: 'test'
      MYSQL_PASSWORD: 'test'
      MYSQL_DATABASE: 'test'
    ports:
      - 3316:3306
    container_name: uql-mysql-9
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/init-mysql.sql:/docker-entrypoint-initdb.d/init-mysql.sql

  mariadb:
    image: mariadb:12.3
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 'root'
      MYSQL_USER: 'test'
      MYSQL_PASSWORD: 'test'
      MYSQL_DATABASE: 'test'
    ports:
      - 3326:3306
    container_name: uql-mariadb-12
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/init-maria.sql:/docker-entrypoint-initdb.d/init-maria.sql

  postgres:
    image: pgvector/pgvector:pg18
    restart: always
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    ports:
      - 5442:5432
    container_name: uql-postgres-18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/init-pg.sql:/docker-entrypoint-initdb.d/init-pg.sql

  # Local stand-in for Neon's edge proxy: forwards a websocket connection to a plain
  # Postgres backend, so `@neondatabase/serverless` can be tested without a hosted Neon
  # project. ALLOW_ADDR_REGEX must match the `address` query param the client sends
  # (see neon/neonQuerier.test.ts's `wsProxy` config) - it defaults to `*.neon.tech:5432`.
  neon-wsproxy:
    image: ghcr.io/neondatabase/wsproxy:latest
    restart: always
    container_name: uql-neon-wsproxy
    environment:
      ALLOW_ADDR_REGEX: '^postgres:5432$'
    ports:
      - 5433:80
    depends_on:
      postgres:
        condition: service_healthy

  cockroachdb:
    image: cockroachdb/cockroach:latest-v26.2
    restart: always
    container_name: uql-cockroachdb-26
    command: start-single-node --insecure
    ports:
      - "26257:26257"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/26257; exit $?"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
